<!DOCTYPE html>
<html>
<head>
  <title>AI Smart Cloud System</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f172a;
      color: white;
    }

    #image {
      margin-top: 20px;
      border-radius: 10px;
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
      color: #38bdf8;
      white-space: pre-line;
    }

    #history img {
      margin: 10px;
      border-radius: 10px;
    }

    button {
      margin-top: 15px;
      padding: 10px;
      border: none;
      background: red;
      color: white;
      cursor: pointer;
    }
  </style>

</head>

<body>

<h2>🤖 AI Smart Cloud System</h2>

<input type="file" id="upload" accept="image/*" capture="environment">

<br>
<img id="image" width="250">

<p id="result">Upload image to analyze</p>

<button onclick="clearHistory()">🗑 Clear History</button>

<h3>📂 History</h3>
<div id="history"></div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<script src="script.js"></script>

</body>
</html>
