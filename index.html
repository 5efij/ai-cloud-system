<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cloud OS</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  height: 100vh;
  overflow: hidden;
}

.desktop {
  padding: 20px;
}

.icon {
  width: 80px;
  text-align: center;
  cursor: pointer;
  color: white;
  margin: 10px;
}

.icon img {
  width: 60px;
}

.window {
  position: absolute;
  width: 300px;
  height: 250px;
  background: white;
  top: 100px;
  left: 100px;
  border-radius: 10px;
  display: none;
  flex-direction: column;
}

.header {
  background: #333;
  color: white;
  padding: 5px;
  cursor: move;
}

.content {
  padding: 10px;
}
</style>
</head>

<body>

<div class="desktop">

  <div class="icon" onclick="openApp('notes')">
    <img src="https://img.icons8.com/color/96/note.png"/>
    <div>Notes</div>
  </div>

  <div class="icon" onclick="openApp('files')">
