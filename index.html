<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cloud OS</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  height: 100vh;
}

.desktop {
  display: flex;
  gap: 20px;
  padding: 20px;
}

.icon {
  width: 80px;
  text-align: center;
  cursor: pointer;
  color: white;
}

.icon img {
  width: 60px;
}

.window {
  position: absolute;
  width: 320px;
  height: 280px;
  background: white;
  top: 120px;
  left: 120px;
  border-radius: 10px;
  display: none;
  flex-direction: column;
}

.header {
  background: #333;
  color: white;
  padding: 8px;
}

.content {
  padding: 10px;
}
</style>
</head>

<body>

<div class="desktop">

  <div class="icon" onclick="openApp('notes')">
    <img src="https://img.icons8.com/color/96/note.png"/>
    <div>Notes</div>
  </div>

  <div class="icon" onclick="openApp('files')">
    <img src="https://img.icons8.com/color/96/folder.png"/>
    <div>Files</div>
  </div>

</div>

<!-- Notes -->
<div class="window" id="notes">
  <div class="header">Notes</div>
  <div class="content">
    <textarea id="noteArea" style="width:100%;height:120px;"></textarea>
    <br><br>
    <button onclick="saveNote()">Save</button>
  </div>
</div>

<!-- Files -->
<div class="window" id="files">
  <div class="header">Files</div>
  <div class="content">
    <input type="file" id="fileInput"/>
    <button onclick="uploadFile()">Upload</button>
    <ul id="fileList"></ul>
  </div>
</div>

<script>
function openApp(id){
  document.getElementById(id).style.display = "flex";
}
</script>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, listAll } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_F9pXCJB0NbXjrIwE_q2X0kY063r1N2s",
  authDomain: "cloudos-27b43.firebaseapp.com",
  projectId: "cloudos-27b43",
  storageBucket: "cloudos-27b43.firebasestorage.app",
  messagingSenderId: "213235329007",
  appId: "1:213235329007:web:87087eb920f11b315cb81a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

// Save Note
window.saveNote = async function() {
  let text = document.getElementById("noteArea").value;

  await setDoc(doc(db, "notes", "main"), {
    content: text
  });

  alert("Saved in Cloud ☁️");
}

// Load Note
async function loadNote() {
  const docRef = doc(db, "notes", "main");
  const docSnap = await getDoc(docRef);

  if (docSnap.exists()) {
    document.getElementById("noteArea").value = docSnap.data().content;
  }
}

// Upload File
window.uploadFile = async function() {
  let file = document.getElementById("fileInput").files[0];

  const storageRef = ref(storage, 'files/' + file.name);
  await uploadBytes(storageRef, file);

  alert("Uploaded to Cloud ☁️");
  listFiles();
}

// List Files
async function listFiles() {
  let list = document.getElementById("fileList");
  list.innerHTML = "";

  const listRef = ref(storage, 'files/');
  const res = await listAll(listRef);

  res.items.forEach(item => {
    let li = document.createElement("li");
    li.textContent = item.name;
    list.appendChild(li);
  });
}

window.onload = () => {
  loadNote();
  listFiles();
};
</script>

</body>
</html>
